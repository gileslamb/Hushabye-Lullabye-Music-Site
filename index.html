<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hushabye Lullabye</title>
<!-- Serve via: python3 -m http.server 8000  — do not open as file:// -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@300;400;600;700&display=swap');

/* ── RESET + ROOT ── */
:root{--amber:#f4a832;--amber-soft:#f9d07a;--pink:#ff6b9d;--cloud:#c8d8f8;--text:#c8d8f0;--hlabel-col:var(--amber-soft);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#05051a;color:var(--text);font-family:'Nunito',sans-serif;cursor:none;}

/* ── CURSOR ── */
#cursor{position:fixed;width:10px;height:10px;background:var(--amber);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .25s,height .25s,background .25s;box-shadow:0 0 10px var(--amber),0 0 20px rgba(244,168,50,.5);mix-blend-mode:screen;}
#cursor.big{width:30px;height:30px;background:var(--pink);box-shadow:0 0 20px var(--pink);}

/* ── STARFIELD ── */
#starfield{position:fixed;inset:0;z-index:0;}

/* ── TITLE ── */
#site-title{position:fixed;top:22px;left:50%;transform:translateX(-50%);text-align:center;z-index:10;opacity:0;animation:fadeDown 2s ease .4s forwards;white-space:nowrap;pointer-events:none;margin-top:36px;}
#site-title h1{font-family:'Baloo 2',cursive;font-size:clamp(1.6rem,4vw,3.2rem);font-weight:800;color:var(--amber);text-shadow:0 0 40px rgba(244,168,50,.7),0 2px 0 rgba(0,0,0,.5);}
#site-title p{font-size:clamp(.65rem,1.1vw,.85rem);font-weight:300;color:rgba(180,210,240,0.9);letter-spacing:.25em;text-transform:uppercase;margin-top:4px;opacity:.6;transition:color 0.6s ease;}

/* ── MOBILE STAGE ── */
#mobile-stage{position:fixed;top:50%;left:50%;transform:translate(-50%,-45%);display:flex;flex-direction:column;align-items:center;opacity:0;animation:fadeUp 2.5s ease 1s forwards;z-index:20;}
#rocket-wrap{animation:rocketBob 4s ease-in-out infinite;position:relative;z-index:2;width:180px;height:230px;flex-shrink:0;transform:translateX(-12px);}
.rp-body{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:90px;height:160px;background:linear-gradient(160deg,#5bcfcf,#3a9fa0 60%,#2a7a7b);clip-path:polygon(50% 0%,85% 30%,100% 100%,0% 100%,15% 30%);box-shadow:inset -8px 0 20px rgba(0,0,0,.3),0 0 30px rgba(78,205,196,.2);}
.rp-fin-l,.rp-fin-r{position:absolute;bottom:8px;width:28px;height:50px;background:#2e8b3a;clip-path:polygon(100% 0%,100% 100%,0% 100%);}
.rp-fin-l{left:calc(50% - 74px);transform:scaleX(-1);}
.rp-fin-r{right:calc(50% - 74px);}
.rp-window{position:absolute;bottom:108px;left:50%;transform:translateX(-50%);width:36px;height:36px;background:radial-gradient(circle at 35% 35%,#fff8e1,#f4a832 60%,#b87000);border-radius:50%;border:3px solid #c87000;box-shadow:0 0 12px rgba(244,168,50,.8);cursor:none;transition:box-shadow .3s;}
.rp-window:hover,.rp-window.playing{box-shadow:0 0 24px rgba(244,168,50,1),0 0 48px rgba(244,168,50,.5);}
.rp-door{position:absolute;bottom:53px;left:50%;transform:translateX(-50%);width:22px;height:28px;background:var(--pink);border-radius:3px 3px 6px 6px;border:2px solid #cc4477;}
#mobile-canvas{display:block;flex-shrink:0;margin-top:-42px;position:relative;z-index:3;pointer-events:auto;}
.hlabel{position:fixed;pointer-events:none;font-family:'Baloo 2',cursive;font-size:.58rem;font-weight:700;color:var(--hlabel-col);letter-spacing:.12em;text-transform:uppercase;transform:translateX(-50%);opacity:0;transition:opacity .2s;white-space:normal;text-align:center;max-width:58px;line-height:1.35;z-index:10;}
/* Nav stars */
.nav-star{position:fixed;z-index:15;cursor:none;display:flex;flex-direction:column;align-items:center;gap:4px;}
.nav-star-dot{width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:0 0 8px 3px rgba(255,255,255,0.6);animation:navPulse 2.5s ease-in-out infinite;transition:box-shadow .3s;}
.nav-star:hover .nav-star-dot{box-shadow:0 0 16px 6px rgba(244,168,50,0.9);}
.nav-star-label{font-family:'Baloo 2',cursive;font-size:.65rem;font-weight:700;color:rgba(244,168,50,0.85);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;text-shadow:0 0 10px rgba(0,0,0,1),0 1px 3px rgba(0,0,0,0.9);order:-1;}
.nav-star:hover .nav-star-label{color:rgba(244,168,50,1);}
.menu-cloud{position:fixed;display:flex;align-items:center;justify-content:center;z-index:16;cursor:none;opacity:0;pointer-events:none;transform:translateX(-50%);}
.menu-cloud-label{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);z-index:10;font-family:'Baloo 2',cursive;font-weight:800;font-size:0.68rem;letter-spacing:0.06em;text-transform:uppercase;white-space:nowrap;pointer-events:none;}
@keyframes navPulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* ── UI CONTROLS ── */
.ui-btn{position:fixed;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:var(--amber);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:none;transition:background .3s,transform .3s;backdrop-filter:blur(8px);z-index:200;}
.ui-btn:hover{background:rgba(255,255,255,.13);transform:scale(1.1);}
#reset-btn{top:auto;bottom:16px;left:auto;right:16px;}
#mute-btn{position:fixed;top:44px;right:16px;background:transparent;border:1px solid rgba(255,255,255,0.6);box-shadow:0 0 12px rgba(255,255,255,0.25);border-radius:8px;color:rgba(240,240,255,0.9);font-family:'Baloo 2',cursive;font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;cursor:none;padding:6px 12px;backdrop-filter:blur(12px);transition:color 0.6s ease, border-color 0.6s ease;z-index:200;}
#mute-btn:hover{background:rgba(255,255,255,.08);color:var(--amber);}
#now-playing-wrap{position:fixed;top:88px;left:16px;z-index:200;display:flex;align-items:baseline;gap:8px;pointer-events:none;opacity:0;transition:opacity 0.5s ease;}
#now-playing-wrap.visible{opacity:1;}
.now-playing-label{font-family:'Baloo 2',cursive;font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(220,230,255,0.85);animation:nowPlayingPulse 2s ease-in-out infinite;}
#mini-track-name,.mini-track-name{font-family:'Baloo 2',cursive;font-size:0.75rem;color:rgba(220,230,255,0.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;transition:color 0.6s ease;}
@keyframes nowPlayingPulse{0%,100%{opacity:0.6}50%{opacity:1}}

/* ── PLAYER PANEL (top left) ── */
#player-panel{position:fixed;top:44px;left:16px;z-index:101;display:flex;align-items:center;gap:8px;
  background:transparent;border:1px solid rgba(255,255,255,0.6);border-radius:8px;padding:6px 10px;backdrop-filter:blur(12px);
  box-shadow:0 0 12px rgba(255,255,255,0.25), inset 0 0 8px rgba(255,255,255,0.04);}
#player-panel .mini-btn{background:none;border:none;color:rgba(220,230,255,0.9);font-family:'Baloo 2',cursive;font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase;cursor:none;padding:4px 8px;border-radius:4px;transition:color 0.6s ease;}
#player-panel .mini-btn:hover{background:rgba(255,255,255,.08);color:var(--amber);}
.time-label{color:rgba(20,40,80,0.55);transition:color 0.6s ease;}
.meter-icon{display:flex;align-items:flex-end;gap:2px;height:12px;}
.meter-icon span{width:3px;background:var(--amber);border-radius:1px;animation:meterBounce 0.5s ease-in-out infinite alternate;}
.meter-icon span:nth-child(1){height:4px;animation-delay:0s;}
.meter-icon span:nth-child(2){height:8px;animation-delay:0.1s;}
.meter-icon span:nth-child(3){height:6px;animation-delay:0.2s;}
.meter-icon span:nth-child(4){height:10px;animation-delay:0.15s;}
.meter-icon span:nth-child(5){height:5px;animation-delay:0.05s;}
@keyframes meterBounce{from{transform:scaleY(0.4)}to{transform:scaleY(1)}}

/* ── DRIFTERS ── */
.drifter{position:fixed;border-radius:50%;pointer-events:none;z-index:1;opacity:0;animation:drift linear infinite;}

/* ── FLOATING TEXT OVERLAY ── */
.floating-text{position:fixed;inset:0;z-index:100;pointer-events:none;display:flex;align-items:center;justify-content:center;}
.floating-text.visible{pointer-events:auto;}
.floating-text-inner{pointer-events:auto;width:min(560px, 88vw);max-height:80vh;overflow-y:auto;text-align:left;padding:28px 32px 32px;background:rgba(5,5,26,0.75);backdrop-filter:blur(20px);border:1px solid rgba(244,168,50,0.12);border-radius:20px;transform:translateY(30px);opacity:0;transition:transform 0.5s ease-out, opacity 0.5s ease-out;position:relative;}
.floating-text.visible .floating-text-inner{transform:translateY(0);opacity:1;}
/* ── FLOATING MUSIC (Album overlay) ── */
#floating-music{position:fixed;inset:0;z-index:100;pointer-events:none;display:flex;align-items:center;justify-content:center;}
#floating-music.visible{pointer-events:auto;}
#floating-music-inner{pointer-events:auto;width:min(560px, 88vw);max-height:80vh;overflow-y:auto;text-align:left;padding:28px 32px 32px;background:rgba(5,5,26,0.75);backdrop-filter:blur(20px);border:1px solid rgba(244,168,50,0.12);border-radius:20px;transform:translateY(30px);opacity:0;transition:transform 0.5s ease-out, opacity 0.5s ease-out;position:relative;}
#floating-music.visible #floating-music-inner{transform:translateY(0);opacity:1;}
.floating-text h2{font-family:'Baloo 2',cursive;font-size:1.55rem;font-weight:800;color:#f4a832;margin-bottom:12px;text-shadow:0 0 20px rgba(244,168,50,.35);}
.floating-text h3{font-family:'Baloo 2',cursive;font-size:.95rem;font-weight:600;color:var(--amber-soft);margin:16px 0 5px;}
.floating-text p{font-size:.93rem;line-height:1.72;color:rgba(200,216,240,0.85);margin-bottom:10px;font-family:'Nunito',sans-serif;}
.pill-link{display:inline-block;padding:7px 16px;border:1px solid rgba(244,168,50,.3);border-radius:100px;color:var(--amber-soft);text-decoration:none;font-size:.78rem;font-weight:600;letter-spacing:.07em;transition:background .25s,border-color .25s;margin:3px 4px 3px 0;}
.pill-link:hover{background:rgba(244,168,50,.12);border-color:rgba(244,168,50,.6);}
.link-row{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.stat-pills{display:flex;gap:10px;margin:10px 0;flex-wrap:wrap;justify-content:center;}
.stat-pill{background:rgba(244,168,50,.08);border:1px solid rgba(244,168,50,.18);border-radius:8px;padding:8px 14px;font-size:.78rem;color:var(--amber-soft);}
.award-row{display:flex;gap:12px;margin:10px 0;flex-wrap:wrap;justify-content:center;}
.award-badge{background:rgba(244,168,50,.08);border:1px solid rgba(244,168,50,.2);border-radius:10px;padding:12px 15px;font-size:.75rem;text-align:center;color:var(--amber-soft);line-height:1.5;}
.award-badge strong{display:block;font-family:'Baloo 2',cursive;font-size:1rem;color:var(--amber);}
.testimonials{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:14px;}
.testimonial{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:16px;font-size:.85rem;line-height:1.65;position:relative;}
.testimonial::before{content:'\201C';position:absolute;top:8px;left:12px;font-family:'Baloo 2',cursive;font-size:2.6rem;color:var(--amber);opacity:.18;line-height:1;}
.testimonial p{opacity:.8;padding-left:4px;}
.testimonial cite{display:block;margin-top:8px;font-size:.7rem;color:var(--amber-soft);opacity:.6;font-style:normal;}
.broadcaster-list{font-size:.88rem;line-height:2;color:rgba(200,216,240,.75);margin:8px 0;}

/* ── TRACK PANEL (under rocket, glass) — visible, toggle via Album/porthole ── */
#track-panel{background:rgba(5,5,26,0.4);border:1px solid rgba(244,168,50,0.15);border-radius:10px;backdrop-filter:blur(12px);padding:8px 12px;margin-top:36px;width:320px;max-height:200px;display:flex;flex-direction:column;transition:transform 0.15s ease-out;}
#track-panel.hidden{display:none !important;}
#track-panel .music-header{font-family:'Baloo 2',cursive;font-size:0.8rem;font-weight:800;color:#f4a832;margin-bottom:6px;text-shadow:0 0 12px rgba(244,168,50,.3);}
#tracks-container{overflow-y:auto;max-height:180px;padding:0 4px 0 0;scrollbar-width:thin;scrollbar-color:rgba(244,168,50,0.25) transparent;}
#tracks-container::-webkit-scrollbar{width:4px;}
#tracks-container::-webkit-scrollbar-track{background:transparent;}
#tracks-container::-webkit-scrollbar-thumb{background:rgba(244,168,50,0.2);border-radius:2px;}
.music-header{font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:800;color:#f4a832;margin-bottom:14px;text-shadow:0 0 20px rgba(244,168,50,.3);}
.track-row{display:flex;flex-direction:column;gap:2px;padding:4px 8px;border-radius:6px;transition:background .2s;cursor:none;}
.track-row:hover{background:rgba(255,255,255,.05);}
.track-row.active{background:rgba(244,168,50,.08);}
.track-row-top{display:flex;align-items:center;gap:6px;}
.track-num{font-size:.65rem;color:rgba(200,216,240,.35);width:14px;text-align:right;flex-shrink:0;}
.track-name{flex:1;font-size:.75rem;color:rgba(200,216,240,.88);text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.track-row.active .track-name{color:var(--amber-soft);}
.track-dur{font-size:.6rem;color:rgba(200,216,240,.4);flex-shrink:0;}
.track-play{background:none;border:1px solid rgba(244,168,50,.25);border-radius:50%;width:20px;height:20px;color:var(--amber);font-size:.6rem;display:flex;align-items:center;justify-content:center;cursor:none;transition:background .2s,border-color .2s;flex-shrink:0;}
.track-progress{height:4px;background:rgba(255,255,255,0.12);border-radius:2px;overflow:hidden;margin-top:4px;cursor:pointer;}
.track-progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--amber-soft));border-radius:2px;width:0%;transition:width .2s linear;box-shadow:0 0 6px rgba(244,168,50,0.4);}
.track-play:hover{background:rgba(244,168,50,.15);border-color:var(--amber);}


/* ── KEYFRAMES ── */
@keyframes fadeDown{from{opacity:0;transform:translateX(-50%) translateY(-14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,-45%) translateY(18px)}to{opacity:1;transform:translate(-50%,-45%) translateY(0)}}
@keyframes rocketBob{0%,100%{transform:translateX(-12px) translateY(0)}50%{transform:translateX(-12px) translateY(8px)}}
@keyframes drift{0%{opacity:0;transform:translateY(110vh) scale(.8)}5%{opacity:var(--op)}95%{opacity:var(--op)}100%{opacity:0;transform:translateY(-15vh) translateX(var(--dx)) scale(1.1)}}
@keyframes portalPulse{0%,100%{box-shadow:0 0 12px rgba(244,168,50,.8)}50%{box-shadow:0 0 28px rgba(244,168,50,1),0 0 56px rgba(244,168,50,.5)}}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  #mobile-stage{transform:translate(-50%,-45%) scale(.72);transform-origin:top center;}
  #tracks-container{padding:8px 10px;}
  .testimonials{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="starfield"></canvas>

<!-- ── TITLE ── -->
<div id="site-title">
  <h1>Hushabye Lullabye</h1>
  <p>A CBeebies &amp; Curious Dreamers experience</p>
</div>

<!-- ── ROCKET MOBILE ── -->
<!-- SWAP POINT A: replace CSS rocket with PNG
     <img id="rocket-img" src="rocket crop master.png" style="width:160px;height:auto;">
     then remove the .rp-body .rp-fin .rp-window .rp-door divs -->
<div id="mobile-stage">
  <div id="rocket-wrap">
    <img id="porthole" src="rocket crop master.png" style="width:220px;height:auto;display:block;margin:0 auto;" title="The Songs">
  </div>
  <canvas id="mobile-canvas" width="500" height="300"></canvas>
</div>

<!-- ── FLOATING CONTENT (transparent over stars) ── -->
<div id="floating-text" class="floating-text">
  <div class="floating-text-inner" id="floating-text-content"></div>
</div>

<!-- ── FLOATING MUSIC (Album overlay) ── -->
<div id="floating-music" class="floating-music">
  <div id="floating-music-inner">
    <div class="music-header">The Songs</div>
    <div id="tracks-container"></div>
    <div class="stream-row" style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">
      <a href="https://open.spotify.com/artist/0LMjRAggIqThiu4STUgVzP" target="_blank" class="pill-link">Spotify</a>
      <a href="#" target="_blank" class="pill-link">Apple Music</a>
      <a href="#" target="_blank" class="pill-link">Bandcamp</a>
    </div>
  </div>
</div>

<!-- ── PLAYER PANEL (top left) ── -->
<div id="player-panel">
  <div class="meter-icon" id="meter-icon" style="display:none;"><span></span><span></span><span></span><span></span><span></span></div>
  <button class="mini-btn" id="btn-playpause">Play</button>
  <button class="mini-btn" id="btn-next">Next</button>
</div>

<!-- ── NOW PLAYING (below player) ── -->
<div id="now-playing-wrap">
  <span class="now-playing-label">Now playing</span>
  <span id="mini-track-name">Play</span>
</div>

<!-- ── PERSISTENT UI ── -->
<button class="ui-btn" id="reset-btn" title="Reset">↺</button>
<button id="mute-btn">MUTE</button>
<div id="daynight-slider-wrap" style="position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:10px;pointer-events:auto;">
  <span style="font-size:1rem;">🌙</span>
  <input type="range" id="daynight-slider" min="0" max="1" step="0.01" value="0"
    style="width:120px;height:3px;accent-color:var(--amber);cursor:none;">
  <span style="font-size:1rem;">☀️</span>
</div>

<div class="menu-cloud" data-id="watch" style="left:12%;top:22%;width:130px;height:76px;"><span class="menu-cloud-label">Watch</span></div>
<div class="menu-cloud" data-id="about" style="left:88%;top:18%;width:100px;height:58px;"><span class="menu-cloud-label">About</span></div>
<div class="menu-cloud" data-id="parents" style="left:8%;top:72%;width:88px;height:52px;"><span class="menu-cloud-label">Parents</span></div>
<div class="menu-cloud" data-id="press" style="left:90%;top:75%;width:118px;height:68px;"><span class="menu-cloud-label">Press</span></div>
<div class="menu-cloud" data-id="album" style="left:50%;top:88%;width:140px;height:78px;"><span class="menu-cloud-label">Album</span></div>

<div id="signup-bar" style="position:fixed;top:0;left:0;right:0;z-index:500;
  background:rgba(5,5,26,0.85);backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;gap:16px;
  padding:7px 40px 7px 20px;
  font-family:'Nunito',sans-serif;font-size:0.72rem;
  transition:opacity 0.5s ease;opacity:0;pointer-events:none;">
  <span style="color:rgba(200,220,240,0.7);letter-spacing:0.04em;">
    Enriching little imaginations — get Curious Dreamers news & Dilly Dally's next adventures
  </span>
  <form id="signup-form" onsubmit="return handleSignup(event)" style="display:flex;gap:6px;align-items:center;">
    <input id="signup-email" type="email" placeholder="your@email.com"
      style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
      border-radius:6px;padding:4px 10px;color:rgba(220,235,255,0.9);
      font-family:'Nunito',sans-serif;font-size:0.7rem;outline:none;cursor:none;width:170px;">
    <button type="submit"
      style="background:none;border:1px solid rgba(244,168,50,0.35);border-radius:6px;
      padding:4px 12px;color:rgba(244,168,50,0.8);font-family:'Baloo 2',cursive;
      font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;cursor:none;">
      Join</button>
  </form>
  <button id="signup-close"
    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:rgba(255,255,255,0.3);font-size:0.85rem;
    cursor:none;line-height:1;padding:2px 6px;">✕</button>
</div>

<script>
let dayAmount = 0; // 0 = full night, 1 = full day

// ═══════════════════════════════════════════════
// CURSOR
// ═══════════════════════════════════════════════
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
function addBigCursor(els) {
  els.forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('big'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('big'));
  });
}
addBigCursor(document.querySelectorAll('.ui-btn, .pill-link, .track-play, #player-panel .mini-btn, #porthole, #mute-btn'));

// ═══════════════════════════════════════════════
// STARFIELD  (original code preserved exactly)
// ═══════════════════════════════════════════════
const sf = document.getElementById('starfield'), sctx = sf.getContext('2d');
let W, H, stars = [];
function resize() { W = sf.width = window.innerWidth; H = sf.height = window.innerHeight; }
resize(); window.addEventListener('resize', () => { resize(); initStars(); });
function initStars() {
  stars = [];
  for (let i = 0; i < Math.floor(W * H / 3000); i++)
    stars.push({ x:Math.random()*W, y:Math.random()*H, z:Math.random(),
      r:Math.random()*1.6+.2, a:Math.random(), da:(Math.random()-.5)*.003,
      hue:Math.random()<.15?200+Math.random()*60:220,
      vx:(Math.random()-.5)*.04, vy:(Math.random()-.5)*.02,
      ox:0, oy:0 }); // ox/oy = repulsion offset
}
initStars();
let mxi = 0, myi = 0, mxAbs = -999, myAbs = -999;
document.addEventListener('mousemove', e => {
  mxi = (e.clientX / W - .5) * 2; myi = (e.clientY / H - .5) * 2;
  mxAbs = e.clientX; myAbs = e.clientY;
});
document.addEventListener('mousemove', e => {
  const px = (e.clientX / window.innerWidth - 0.5) * 18;
  const py = (e.clientY / window.innerHeight - 0.5) * 12;
  const inner = document.querySelector('.floating-text.visible .floating-text-inner');
  if (inner) inner.style.transform = `translateY(0) translate(${px}px, ${py}px)`;
  const musicInner = document.querySelector('#floating-music.visible #floating-music-inner');
  if (musicInner) musicInner.style.transform = `translateY(0) translate(${px}px, ${py}px)`;
});

function drawStars() {
  sctx.clearRect(0, 0, W, H);
  // Night sky gradient
  const nightBg = sctx.createRadialGradient(W*.5, H*.4, 0, W*.5, H*.4, Math.max(W,H)*.8);
  nightBg.addColorStop(0, '#1a0a3d'); nightBg.addColorStop(.4, '#0d0835'); nightBg.addColorStop(1, '#05051a');
  sctx.fillStyle = nightBg; sctx.fillRect(0, 0, W, H);
  // Day sky gradient (cross-fade)
  const dayBg = sctx.createRadialGradient(W*.5, H*.4, 0, W*.5, H*.4, Math.max(W,H)*.8);
  dayBg.addColorStop(0, '#1a9fd8'); dayBg.addColorStop(.4, '#3ab5e0'); dayBg.addColorStop(0.5, '#48c2ee'); dayBg.addColorStop(1, '#60d0f5');
  sctx.globalAlpha = dayAmount;
  sctx.fillStyle = dayBg; sctx.fillRect(0, 0, W, H);
  sctx.globalAlpha = 1;
  for (const s of stars) {
    // Mouse repulsion
    const dx = s.x - mxAbs, dy = s.y - myAbs;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 140 && dist > 0) {
      const force = (140 - dist) / 140 * 0.7;
      s.ox += (dx / dist) * force;
      s.oy += (dy / dist) * force;
    }
    s.ox *= 0.92; s.oy *= 0.92; // drag back
    s.x += s.vx + mxi * s.z * .15 + s.ox;
    s.y += s.vy + myi * s.z * .08 + s.oy;
    s.a += s.da;
    if (s.a > 1) { s.a = 1; s.da *= -1; } if (s.a < .1) { s.a = .1; s.da *= -1; }
    if (s.x < 0) s.x = W; if (s.x > W) s.x = 0; if (s.y < 0) s.y = H; if (s.y > H) s.y = 0;
    const sz = s.r * (.5 + s.z * .5);
    const starAlpha = s.a * (1 - dayAmount);
    const g = sctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, sz*3);
    g.addColorStop(0, `hsla(${s.hue},80%,95%,${starAlpha})`);
    g.addColorStop(.4, `hsla(${s.hue},60%,80%,${starAlpha*.4})`);
    g.addColorStop(1, `hsla(${s.hue},40%,60%,0)`);
    sctx.beginPath(); sctx.arc(s.x, s.y, sz*3, 0, Math.PI*2); sctx.fillStyle = g; sctx.fill();
    sctx.beginPath(); sctx.arc(s.x, s.y, sz, 0, Math.PI*2);
    sctx.fillStyle = `hsla(${s.hue},90%,98%,${starAlpha})`; sctx.fill();
  }
  if (dayAmount > 0) {
    const t = performance.now() / 1000;
    CLOUD_DEFS.forEach((cd, i) => {
      const bob = Math.sin(t * cloudBobSpeeds[i] + cloudBobOffsets[i]) * 7;
      const cx = W * cd.xPct;
      const cy = H * cd.yPct + bob;
      drawMenuCloud(sctx, cx, cy, cd.w, cd.h, dayAmount, cd);
    });
    const t2 = performance.now() / 1000;
    BG_CLOUDS.forEach((bc, i) => {
      const bob = Math.sin(t2 * 0.5 + bc.bob) * 6;
      drawMenuCloud(sctx, W * bc.xPct, H * bc.yPct + bob, bc.w, bc.h, dayAmount * 0.7, bc);
    });
  }
  requestAnimationFrame(drawStars);
}

function drawMenuCloud(ctx, cx, cy, w, h, alpha, cd) {
  if (alpha <= 0) return;
  const N = cd ? cd.n : 6;
  const jitter = [1.0,1.22,0.84,1.18,0.90,1.28,0.82,1.15];
  const angles = [0, 0.9, 1.9, 2.9, 1.4, 2.4, 0.4, 3.4];
  const radii  = [0, 0.38, 0.35, 0.32, 0.28, 0.36, 0.30, 0.34];
  const SR = Math.min(w, h) * 0.32;
  for (let i = 0; i < N; i++) {
    const angle = angles[i % angles.length];
    const dist  = i === 0 ? 0 : radii[i % radii.length] * Math.min(w, h);
    const sx = cx + Math.cos(angle) * dist;
    const sy = cy + Math.sin(angle) * dist * 0.7;
    const r  = SR * (jitter[i % jitter.length]);
    ctx.save();
    ctx.globalAlpha = alpha * 0.88;
    const g = ctx.createRadialGradient(sx-r*.30,sy-r*.30,r*.04,sx+r*.10,sy+r*.10,r);
    g.addColorStop(0,   "rgba(255,255,255,0.82)");
    g.addColorStop(0.30,"rgba(240,248,255,0.75)");
    g.addColorStop(0.62,"rgba(208,228,252,0.65)");
    g.addColorStop(1,   "rgba(148,188,232,0.50)");
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.shadowColor = "rgba(180,220,255,0.4)";
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.restore();
  }
}

requestAnimationFrame(drawStars);

// 3D RING MOBILE  (original code preserved exactly)
// ═══════════════════════════════════════════════
const mc = document.getElementById('mobile-canvas');
const mctx = mc.getContext('2d');
const CX=250, CY=48, RX=112, TILT=0.04, RY=RX*TILT, THICK=52, SPEED=0.004;

// 10 song hangers — evenly spaced around the ring
// Each index i: TRACK_NAMES[i], HANGER_EMOJIS[i], TRACK_FILES[i] must stay in sync
// label = song name shown below emoji, trackIdx = which track to play on click
const TRACK_NAMES = [
  'Hushabye Lullabye',
  'Chumble Bumble',
  'Spring Showers',
  'Bathtime Ducks',
  'Summer Sunshine',
  'Flutterbye Butterfly',
  'Autumn Leaves',
  'Paper Boats',
  'Winter Snow',
  'Star Ballet'
];
const HANGER_EMOJIS = ['⭐','🌙','💛','🌸','☀️','🦋','🍂','🚢','❄️','💫'];
const HANGER_COLS   = ['#f9d070','#a0c8ff','#ffe080','#ffb0d0','#ffd060','#c0d8ff','#f0b060','#80c8ff','#d0e8ff','#e0d0ff'];
const HANGER_LENS   = [110,132,105,122,115,128,108,118,125,112];
const HANGERS = TRACK_NAMES.map((name, i) => ({
  a: (i / TRACK_NAMES.length) * Math.PI * 2,
  emoji: HANGER_EMOJIS[i],
  label: name,
  trackIdx: i,
  tLen: HANGER_LENS[i],
  col: HANGER_COLS[i]
}));

const heroEl = document.getElementById('mobile-stage');
const labels = HANGERS.map(h => {
  const el = document.createElement('div'); el.className = 'hlabel';
  el.innerHTML = h.label.split(' ').join('<br>'); document.body.appendChild(el); return el;
});

let ringAngle = 0, ringAngleTarget = null, hitZones = [];
let hoveredTrackIdx = -1;
const hoverScales = new Array(10).fill(0);

function proj(theta) {
  const wx = Math.cos(theta)*RX, wz = Math.sin(theta)*RX;
  return { sx: CX+wx, sy: CY-wz*TILT, depth: wz/RX };
}

function drawFrame() {
  mctx.clearRect(0, 0, 500, 300);
  // Smooth reset lerp
  if (ringAngleTarget !== null) {
    ringAngle += (ringAngleTarget - ringAngle) * 0.04;
    if (Math.abs(ringAngle - ringAngleTarget) < 0.001) ringAngleTarget = null;
  } else {
    ringAngle += SPEED;
  }

  const hd = HANGERS.map((h, i) => {
    const theta = h.a + ringAngle;
    const {sx, sy, depth} = proj(theta);
    return {...h, sx, sy, depth, objX:sx, objY:sy+h.tLen, theta};
  });

  const far  = hd.filter(d => d.depth < 0).sort((a,b) => a.depth - b.depth);
  const near = hd.filter(d => d.depth >= 0).sort((a,b) => b.depth - a.depth);

  hd.forEach((d, i) => {
    const target = (d.trackIdx === hoveredTrackIdx && d.depth >= 0) ? 1.0 : 0.0;
    hoverScales[i] = hoverScales[i] + (target - hoverScales[i]) * 0.12;
  });

  far.forEach((d) => drawHanger(d, true, hoverScales[d.trackIdx]));
  drawRing();
  near.forEach((d) => drawHanger(d, false, hoverScales[d.trackIdx]));

  hitZones = [];
  const cr = mc.getBoundingClientRect();
  hd.forEach((d, i) => {
    hitZones.push({x:d.objX, y:d.objY, r:60, trackIdx:d.trackIdx, depth:d.depth});
    const frontness = Math.max(0, (d.depth+1)/2);
    const lbl = labels[d.trackIdx];
    lbl.style.left = (cr.left + d.objX) + 'px';
    lbl.style.top  = (cr.top  + d.objY + 30) + 'px';
    lbl.style.opacity = String(Math.pow(frontness, 3) * 0.95);
  });

  requestAnimationFrame(drawFrame);
}

function drawRing() {
  const N=14, SR=30;
  const jitter=[1.0,1.22,0.84,1.18,0.90,1.28,0.82,1.15,0.95,1.20,0.86,1.10,1.24,0.88];
  const spheres=[];
  for(let i=0;i<N;i++){
    const theta=(i/N)*Math.PI*2+ringAngle;
    const wx=Math.cos(theta)*RX, wz=Math.sin(theta)*RX;
    spheres.push({sx:CX+wx, sy:CY-wz*TILT, depth:wz/RX, idx:i});
  }
  spheres.sort((a,b)=>a.depth-b.depth);
  for(const s of spheres){
    const front=(s.depth+1)/2, r=SR*jitter[s.idx]*(0.45+0.55*front);
    mctx.save(); mctx.globalAlpha=0.18+0.82*front;
    mctx.beginPath(); mctx.ellipse(s.sx+4*front,s.sy+r*0.55,r*0.75,r*0.22,0,0,Math.PI*2);
    mctx.fillStyle="rgba(60,100,160,0.18)"; mctx.fill();
    const g=mctx.createRadialGradient(s.sx-r*.30,s.sy-r*.30,r*.04,s.sx+r*.10,s.sy+r*.10,r);
    g.addColorStop(0,"rgba(255,255,255,1.00)"); g.addColorStop(0.30,"rgba(240,248,255,0.98)");
    g.addColorStop(0.62,"rgba(208,228,252,0.95)"); g.addColorStop(1,"rgba(148,188,232,0.88)");
    mctx.beginPath(); mctx.arc(s.sx,s.sy,r,0,Math.PI*2); mctx.fillStyle=g;
    if(front>0.4){mctx.shadowColor=dayAmount>0.5?"rgba(30,60,100,0.35)":"rgba(220,235,255,0.6)"; mctx.shadowBlur=16;}
    mctx.fill(); mctx.shadowBlur=0;
    const pr=r*.52,px=s.sx-r*.33,py=s.sy-r*.35;
    const g2=mctx.createRadialGradient(px-pr*.25,py-pr*.25,pr*.04,px+pr*.1,py+pr*.1,pr);
    g2.addColorStop(0,"rgba(255,255,255,0.97)"); g2.addColorStop(1,"rgba(195,220,248,0.72)");
    mctx.beginPath(); mctx.arc(px,py,pr,0,Math.PI*2); mctx.fillStyle=g2; mctx.fill();
    const pr3=r*.38,px3=s.sx+r*.28,py3=s.sy+r*.18;
    const g3=mctx.createRadialGradient(px3-pr3*.2,py3-pr3*.2,pr3*.04,px3,py3,pr3);
    g3.addColorStop(0,"rgba(245,252,255,0.90)"); g3.addColorStop(1,"rgba(180,208,240,0.60)");
    mctx.beginPath(); mctx.arc(px3,py3,pr3,0,Math.PI*2); mctx.fillStyle=g3; mctx.fill();
    mctx.restore();
  }
}

function drawHanger(d, isFar, hoverAmt = 0) {
  const alpha  = isFar ? 0.28 : 1.0;
  const dscale = 0.55 + 0.45 * ((d.depth+1)/2);
  const isHovered = !isFar && d.trackIdx === hoveredTrackIdx;
  const amt = (typeof hoverAmt === 'number' && !isNaN(hoverAmt)) ? hoverAmt : 0;
  const hoverScale = 1.0 + amt * 1.0;
  mctx.save(); mctx.globalAlpha = alpha;
  mctx.beginPath(); mctx.moveTo(d.sx, d.sy); mctx.lineTo(d.objX, d.objY);
  const ta = Math.max(0, (d.depth+1)/2);
  const stringCol = dayAmount > 0.5
    ? `rgba(20,40,60,${(ta * 0.85).toFixed(2)})`
    : `rgba(200,220,255,${ta.toFixed(2)})`;
  mctx.strokeStyle = stringCol;
  mctx.lineWidth = 1; mctx.stroke();
  const fs = Math.round(24 * dscale);
  mctx.font = `${fs}px serif`; mctx.textAlign = 'center'; mctx.textBaseline = 'middle';
  if (!isFar) { mctx.shadowColor = d.col; mctx.shadowBlur = 14; }
  // Scale emoji around its center when hovered
  if (hoverScale > 1.001) {
    mctx.save();
    mctx.translate(d.objX, d.objY);
    mctx.scale(hoverScale, hoverScale);
    mctx.translate(-d.objX, -d.objY);
    mctx.fillText(d.emoji, d.objX, d.objY);
    mctx.restore();
  } else {
    mctx.fillText(d.emoji, d.objX, d.objY);
  }
  if (isHovered) {
    mctx.beginPath();
    mctx.arc(d.objX, d.objY, fs * 0.9, 0, Math.PI * 2);
    mctx.strokeStyle = 'rgba(244,168,50,0.55)';
    mctx.lineWidth = 2;
    mctx.stroke();
  }
  mctx.restore();
}

// Canvas click — use capture phase so we handle before nav stars/menu clouds can intercept
function handleCanvasAreaClick(e) {
  if (e.target.closest('#floating-music-inner') || e.target.closest('.floating-text-inner')) return;
  const r = mc.getBoundingClientRect();
  if (e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom) return;
  e.stopPropagation();
  e.preventDefault();
  const mx = (e.clientX - r.left) * (mc.width / r.width);
  const my = (e.clientY - r.top) * (mc.height / r.height);
  for (const z of hitZones) {
    const dx = mx - z.x, dy = my - z.y;
    if (dx*dx + dy*dy < z.r*z.r) {
      playTrack(z.trackIdx);
      return;
    }
  }
  closeAll();
}
document.addEventListener('click', handleCanvasAreaClick, { capture: true });
function updateHoverFromMouse(e) {
  const r = mc.getBoundingClientRect();
  if (e.clientX < r.left || e.clientX > r.right || e.clientY < r.top || e.clientY > r.bottom) {
    hoveredTrackIdx = -1;
    return;
  }
  const mx = (e.clientX - r.left) * (mc.width / r.width);
  const my = (e.clientY - r.top) * (mc.height / r.height);
  const hits = hitZones.filter(z => {
    const dx = mx - z.x, dy = my - z.y;
    return dx*dx + dy*dy < z.r*z.r;
  });
  hoveredTrackIdx = hits.length ? hits.sort((a,b) => (b.depth||0) - (a.depth||0))[0].trackIdx : -1;
}
mc.addEventListener('mousemove', updateHoverFromMouse);
mc.addEventListener('mouseleave', () => { hoveredTrackIdx = -1; });
document.addEventListener('mousemove', updateHoverFromMouse);

    const id = el.dataset.id;
    const ns = NAV_STARS.find(n => n.id === id);
    if (!ns) return;
    if (ns.id === 'album') showMusicList();
    else showContent(ns.content, ns.id);
  });
});
function syncCloudDivs() {
  const t = performance.now() / 1000;
  document.querySelectorAll('.menu-cloud').forEach((el, i) => {
    const cd = CLOUD_DEFS[i];
    if (!cd) return;
    const bob = Math.sin(t * cloudBobSpeeds[i] + cloudBobOffsets[i]) * 7;
    const px = parseFloat(el.dataset.ox || 0);
    el.style.left = (W * cd.xPct) + 'px';
    el.style.top  = (H * cd.yPct + bob + parseFloat(el.dataset.oy || 0)) + 'px';
    el.style.width  = cd.w + 'px';
    el.style.height = cd.h + 'px';
    el.style.transform = `translateX(calc(-50% + ${px}px))`;
  });
  requestAnimationFrame(syncCloudDivs);
}
requestAnimationFrame(syncCloudDivs);

function showContent(html, id) {
  if (currentPanel === id) { closeAll(); return; }
  closeAll();
  currentPanel = id;
  document.getElementById('mobile-stage').style.transition = 'opacity 0.6s ease';
  document.getElementById('mobile-stage').style.opacity = '0';
  document.getElementById('mobile-stage').style.pointerEvents = 'none';
  floatingTextContent.innerHTML = html;
  const backBtn = document.createElement('button');
  backBtn.textContent = '← Back';
  backBtn.style.cssText = 'background:none;border:none;color:rgba(244,168,50,0.6);font-family:"Baloo 2",cursive;font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;cursor:none;padding:0 0 16px 0;display:block;';

  backBtn.addEventListener('mouseleave', () => document.getElementById('cursor').classList.remove('big'));

}

// MUSIC PLAYER
// ═══════════════════════════════════════════════
// Tracks: scan mp3/ folder via directory listing (Python http.server) or use fallback
const TRACK_FILES_FALLBACK = [
  '01 Hushabye Lullabye, Goodnight Dreams | CBeebies.mp3',
  '02 - Chumble Bumble.mp3',
  '03 - Spring Showers.mp3',
  '04 - Bathtime ducks.mp3',

  '06 - Flutterbye Butterfly.mp3',
  '07 - Autumn Leaves.mp3',
  '08 - Paper Boats.mp3',
  '09 - Winter snow.mp3',
  '10 - Star Ballet Album.mp3'
];
let TRACK_FILES = [...TRACK_FILES_FALLBACK];

// Declared early so playTrack can reference it
const bgTheme = new Audio('mp3/Hushabye Lullabye Theme (Extended).mp3');
bgTheme.loop = true; bgTheme.volume = 0.15;

async function loadTracks() {
  // Always use fallback filenames — these match the actual mp3/ folder contents
  TRACK_FILES = [...TRACK_FILES_FALLBACK];

  const container = document.getElementById('tracks-container');

  if (TRACK_FILES.length === 0) {
    container.innerHTML = '<p style="color:rgba(200,216,240,.35);font-size:.85rem;padding:8px 0;">Tracks coming soon — check back shortly ✦</p>';
    return;
  }

  container.innerHTML = '';
  TRACK_FILES.forEach((file, i) => {
    // Clean filename into display name
    let name = file.replace(/\.mp3$/i, '');           // strip extension
    name = name.replace(/^\d+\s*/, '');               // strip leading number
    // "Series Name, Track Name | Source" → extract Track Name
    if (name.includes(',')) {
      const afterComma = name.split(',')[1] || '';
      name = afterComma.replace(/\s*[|].*$/, '').trim();
    } else {
      name = name.replace(/^[-\s]*/, '');              // strip leading dash
      name = name.replace(/\s*[|].*$/, '');            // strip pipe suffix
      name = name.replace(/\s*-\s*Hushabye.*$/i, ''); // strip series suffix
      name = name.replace(/\bAlbum\b/gi, '').trim();  // strip word Album
    }
    name = name.replace(/\s+/g, ' ').trim();
    if (!name) name = file.replace(/\.mp3$/i,'');
    const row = document.createElement('div');
    row.className = 'track-row'; row.dataset.idx = i;
    row.innerHTML = `
      <div class="track-row-top">
        <span class="track-num">${String(i+1).padStart(2,'0')}</span>
        <span class="track-name">${name}</span>
        <span class="track-dur" id="dur-${i}">–:––</span>
        <button class="track-play" data-idx="${i}" title="Play ${name}">▶</button>
      </div>
      <div class="track-progress"><div class="track-progress-fill" id="track-prog-${i}"></div></div>`;
    container.appendChild(row);
    // Preload duration
    const tmp = new Audio('mp3/' + file);
    tmp.addEventListener('loadedmetadata', () => {
      document.getElementById('dur-'+i).textContent = fmtTime(tmp.duration);
    });
  });

  addBigCursor(container.querySelectorAll('.track-play,.track-row'));
  document.querySelectorAll('.track-play').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx);
      if (currentIdx === idx && isPlaying) {
        currentAudio.pause();
        isPlaying = false;
        btn.textContent = '▶';
        document.getElementById('btn-playpause').textContent = 'Play';
      } else {
        playTrack(idx);
      }
    });
  });
  document.querySelectorAll('.track-row').forEach(row => {
    row.addEventListener('click', e => {
      if (e.target.closest('.track-play')) return;
      if (e.target.closest('.track-progress') && parseInt(row.dataset.idx) === currentIdx && currentAudio) {
        const prog = e.target.closest('.track-progress');
        const r = prog.getBoundingClientRect();
        currentAudio.currentTime = ((e.clientX - r.left) / r.width) * currentAudio.duration;
        return;
      }
      playTrack(parseInt(row.dataset.idx));
    });
  });
}

let currentAudio = null, currentIdx = -1, isPlaying = false;

function playTrack(idx) {
  if (idx < 0 || idx >= TRACK_FILES.length) return;
  if (bgTheme && !bgTheme.paused) bgTheme.pause();
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  // Update UI — reset all play buttons and progress before switching
  document.querySelectorAll('.track-play').forEach(b => { b.textContent = '▶'; });
  document.querySelectorAll('.track-row').forEach((r,i) => r.classList.toggle('active', i===idx));
  document.querySelectorAll('.track-progress-fill').forEach(el => el.style.width = '0%');

  currentIdx = idx;
  let name = TRACK_FILES[idx].replace(/\.mp3$/i,'');
  name = name.replace(/^\d+\s*/, '');
  if (name.includes(',')) {
    const afterComma = name.split(',')[1] || '';
    name = afterComma.replace(/\s*[|].*$/, '').trim();
  } else {
    name = name.replace(/^[-\s]*/,'').replace(/\s*[|].*$/,'');
    name = name.replace(/\s*-\s*Hushabye.*$/i,'').replace(/\bAlbum\b/gi,'').trim();
  }
  name = name.replace(/\s+/g,' ').trim();

  // Show loading
  const playBtn = document.querySelector('.track-play[data-idx="'+idx+'"]');
  if (playBtn) playBtn.textContent = '…';

  currentAudio = new Audio('mp3/' + TRACK_FILES[idx]);
  currentAudio.volume = 0.8;

  currentAudio.addEventListener('canplay', () => {
    if (bgTheme && !bgTheme.paused) bgTheme.pause();
    if (playBtn) playBtn.textContent = '⏸';
    currentAudio.play();
    isPlaying = true;
    document.getElementById('mini-track-name').textContent = name;
    document.getElementById('now-playing-wrap').classList.add('visible');
    document.getElementById('btn-playpause').textContent = 'Pause';
    document.getElementById('meter-icon').style.display = 'flex';
    document.getElementById('porthole').classList.add('playing');
  });

  currentAudio.addEventListener('timeupdate', updateProgress);
  currentAudio.addEventListener('ended', () => {
    if (currentIdx < TRACK_FILES.length - 1) playTrack(currentIdx + 1);
    else stopPlayer();
  });
}

function stopPlayer() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  if (bgTheme) bgTheme.play().catch(()=>{});
  isPlaying = false;
  document.querySelectorAll('.track-row').forEach(r => r.classList.remove('active'));
  document.querySelectorAll('.track-play').forEach(b => b.textContent = '▶');
  document.getElementById('btn-playpause').textContent = 'Play';
  document.getElementById('meter-icon').style.display = 'none';
  document.getElementById('porthole').classList.remove('playing');
  document.getElementById('mini-track-name').textContent = 'Play';
  document.getElementById('now-playing-wrap').classList.remove('visible');
  document.querySelectorAll('.track-progress-fill').forEach(el => el.style.width = '0%');
  currentIdx = -1;
}

function updateProgress() {
  if (!currentAudio || !currentAudio.duration) return;
  const pct = (currentAudio.currentTime / currentAudio.duration) * 100;
  const progEl = document.getElementById('track-prog-'+currentIdx);
  if (progEl) progEl.style.width = pct + '%';
}

function fmtTime(s) {
  if (!isFinite(s)) return '–:––';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return m + ':' + String(sec).padStart(2,'0');
}

// Player panel controls
document.getElementById('btn-playpause').addEventListener('click', () => {
  if (!currentAudio) {
    const idx = Math.floor(Math.random() * TRACK_FILES.length);
    playTrack(idx);
    return;
  }
  if (isPlaying) {
    currentAudio.pause();
    isPlaying = false;
    document.getElementById('btn-playpause').textContent = 'Play';
    document.getElementById('meter-icon').style.display = 'none';
    const pb = document.querySelector('.track-play[data-idx="'+currentIdx+'"]');
    if (pb) pb.textContent = '▶';
  } else {
    currentAudio.play();
    isPlaying = true;
    document.getElementById('btn-playpause').textContent = 'Pause';
    document.getElementById('meter-icon').style.display = 'flex';
    const pb = document.querySelector('.track-play[data-idx="'+currentIdx+'"]');
    if (pb) pb.textContent = '⏸';
  }
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (currentIdx >= 0 && currentIdx < TRACK_FILES.length - 1) playTrack(currentIdx + 1);
  else if (currentIdx < 0) playTrack(Math.floor(Math.random() * TRACK_FILES.length));
  else playTrack(0);
});

  } else {
    if (bar) { bar.style.background = 'rgba(5,5,26,0.85)'; bar.style.borderBottom = '1px solid rgba(255,255,255,0.08)'; }
    if (barText) barText.style.color = 'rgba(200,220,240,0.7)';
    if (barInput) { barInput.style.color = 'rgba(220,235,255,0.9)'; barInput.style.borderColor = 'rgba(255,255,255,0.15)'; barInput.style.background = 'rgba(255,255,255,0.06)'; }
